name: 🚀 Deploy Full (Server Sync)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Enviar .env a partir do secret ENV_FILE (use no deploy do zero)"
        required: false
        default: false
        type: boolean
      clean_remote:
        description: "Deletar arquivos remotos antes do upload (CUIDADO)"
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔐 Validate deploy secrets
        run: |
          if [ -z "${{ secrets.SFTP_HOST }}" ] || [ -z "${{ secrets.SFTP_USERNAME }}" ] || [ -z "${{ secrets.SFTP_PASSWORD }}" ]; then
            echo "Missing one of: SFTP_HOST / SFTP_USERNAME / SFTP_PASSWORD"
            exit 1
          fi
          if [ -z "${{ secrets.SFTP_REMOTE_DIR }}" ]; then
            echo "Missing secret: SFTP_REMOTE_DIR"
            exit 1
          fi
          case "${{ secrets.SFTP_REMOTE_DIR }}" in
            "~"* )
              echo "SFTP_REMOTE_DIR cannot start with '~'. Use an absolute path like /var/www/.../web."
              exit 1
              ;;
          esac

      - name: 🧰 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Frontend Dependencies
        run: npm ci

      - name: 🏗️ Build Frontend (Vite)
        run: npm run build

      - name: 🐘 Setup PHP (for Composer)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: 📦 Install PHP Dependencies (Composer)
        run: composer install --no-interaction --no-dev --prefer-dist --optimize-autoloader

      - name: 📁 Ensure Remote Directory Exists (Server)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT != '' && secrets.SFTP_PORT || '22' }}
          script: |
            mkdir -p "${{ secrets.SFTP_REMOTE_DIR }}"
            cd "${{ secrets.SFTP_REMOTE_DIR }}"
            mkdir -p public/build/assets storage bootstrap/cache || true
            echo "Remote dir ok: ${{ secrets.SFTP_REMOTE_DIR }}"

      - name: 🛠️ Ensure public/build is writable (Server)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT != '' && secrets.SFTP_PORT || '22' }}
          script: |
            cd "${{ secrets.SFTP_REMOTE_DIR }}"
            echo "== whoami ==" && whoami || true
            rm -rf public/build 2>/dev/null || true
            mkdir -p public/build/assets || true
            chmod -R u+rwX public/build storage bootstrap/cache 2>/dev/null || true
            chmod -R g+rwX public/build storage bootstrap/cache 2>/dev/null || true
            ls -ld public public/build public/build/assets storage bootstrap/cache 2>/dev/null || true

      - name: 🔧 Prepare Deploy (full)
        run: |
          rm -rf deploy_temp
          mkdir -p deploy_temp

          echo "📦 Exportando repo inteiro (git archive)"
          git archive --format=tar HEAD | tar -x -C deploy_temp

          # Include Vite build
          if [ ! -f public/build/manifest.json ]; then
            echo "❌ public/build/manifest.json não encontrado. O build do Vite falhou?"
            exit 1
          fi
          mkdir -p deploy_temp/public
          rm -rf deploy_temp/public/build
          cp -a public/build deploy_temp/public/build
          echo "📦 Incluído: public/build"

          # Include vendor
          if [ ! -d vendor ]; then
            echo "❌ vendor/ não encontrado. O composer install falhou?"
            exit 1
          fi
          rm -rf deploy_temp/vendor
          cp -a vendor deploy_temp/vendor
          echo "📦 Incluído: vendor/"

          # Optional .env from secret
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.deploy_env }}" = "true" ]; then
            if [ -n "${{ secrets.ENV_FILE }}" ]; then
              echo "${{ secrets.ENV_FILE }}" > deploy_temp/.env
              echo "🔐 Incluído: .env a partir do secret ENV_FILE"
            else
              echo "⚠️ deploy_env=true mas secret ENV_FILE não está configurado."
            fi
          fi

      - name: ✅ Check Deploy Files
        id: check_deploy
        run: |
          if [ -d deploy_temp ] && find deploy_temp -maxdepth 2 -type f -print -quit | grep -q .; then
            echo "has_deploy_files=true" >> $GITHUB_OUTPUT
          else
            echo "has_deploy_files=false" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 Deploy Full (SFTP)
        if: steps.check_deploy.outputs.has_deploy_files == 'true'
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT != '' && secrets.SFTP_PORT || '22' }}
          local_path: './deploy_temp/*'
          remote_path: ${{ secrets.SFTP_REMOTE_DIR }}
          sftp_only: false
          delete_remote_files: ${{ github.event.inputs.clean_remote }}

      - name: 🧹 Post-deploy (Server)
        if: steps.check_deploy.outputs.has_deploy_files == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT != '' && secrets.SFTP_PORT || '22' }}
          script: |
            cd "${{ secrets.SFTP_REMOTE_DIR }}"
            rm -f public/hot || true
            mkdir -p storage bootstrap/cache || true
            php artisan optimize:clear || true

      - name: 🧹 Cleanup
        if: always()
        run: rm -rf deploy_temp
