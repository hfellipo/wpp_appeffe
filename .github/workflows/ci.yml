name: 🚀 Deploy Incremental

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔐 Validate deploy secrets
        run: |
          if [ -z "${{ secrets.SFTP_HOST }}" ] || [ -z "${{ secrets.SFTP_USERNAME }}" ] || [ -z "${{ secrets.SFTP_PASSWORD }}" ]; then
            echo "Missing one of: SFTP_HOST / SFTP_USERNAME / SFTP_PASSWORD"
            exit 1
          fi
          if [ -z "${{ secrets.SFTP_REMOTE_DIR }}" ]; then
            echo "Missing secret: SFTP_REMOTE_DIR"
            exit 1
          fi
          case "${{ secrets.SFTP_REMOTE_DIR }}" in
            "~"* )
              echo "SFTP_REMOTE_DIR cannot start with '~' for SFTP uploads. Use an absolute path like /home/user/app."
              exit 1
              ;;
          esac

      - name: 🔍 Detect Changes
        id: changes
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              BEFORE_SHA="$(git rev-parse HEAD~1)"
            else
              BEFORE_SHA=""
            fi
          fi
          if [ -n "$BEFORE_SHA" ]; then
            CHANGED_FILES=$(git diff --diff-filter=ACMRT --name-only "$BEFORE_SHA" HEAD || true)
            DELETED_FILES=$(git diff --diff-filter=D --name-only "$BEFORE_SHA" HEAD || true)
          else
            CHANGED_FILES=$(git ls-tree -r --name-only HEAD || true)
            DELETED_FILES=""
          fi
          if [ -n "$CHANGED_FILES" ] || [ -n "$DELETED_FILES" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            if [ -n "$CHANGED_FILES" ]; then
              echo "has_changed_files=true" >> $GITHUB_OUTPUT
            else
              echo "has_changed_files=false" >> $GITHUB_OUTPUT
            fi
            {
              echo "changed_files<<EOF"
              echo "$CHANGED_FILES"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            {
              echo "deleted_files<<EOF"
              echo "$DELETED_FILES"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "has_changed_files=false" >> $GITHUB_OUTPUT
          fi

      - name: ⏭️ Skip Deploy (No Changes)
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "✅ Nenhuma mudança detectada. Deploy cancelado."
          exit 0

      - name: 🗑️ Remove Deleted Files (Server)
        if: steps.changes.outputs.has_changes == 'true' && steps.changes.outputs.deleted_files != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT != '' && secrets.SFTP_PORT || '22' }}
          script: |
            mkdir -p "${{ secrets.SFTP_REMOTE_DIR }}"
            cd "${{ secrets.SFTP_REMOTE_DIR }}"
            FILES="${{ steps.changes.outputs.deleted_files }}"
            for f in $FILES; do
              if [ -f "$f" ]; then
                rm -f -- "$f" || true
                echo "removido arquivo: $f"
              fi
            done
            for f in $FILES; do
              d=$(dirname "$f")
              [ "$d" != "." ] && rmdir -p --ignore-fail-on-non-empty -- "$d" 2>/dev/null || true
            done

      - name: 📁 Ensure Remote Directory Exists (Server)
        if: steps.changes.outputs.has_changed_files == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT != '' && secrets.SFTP_PORT || '22' }}
          script: |
            mkdir -p "${{ secrets.SFTP_REMOTE_DIR }}"
            echo "Remote dir ok: ${{ secrets.SFTP_REMOTE_DIR }}"

      - name: 🔧 Prepare Deploy
        if: steps.changes.outputs.has_changed_files == 'true'
        run: |
          mkdir -p deploy_temp
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              mkdir -p "deploy_temp/$(dirname "$file")"
              cp "$file" "deploy_temp/$file"
              echo "📄 Preparado: $file"
            fi
          done <<< "${{ steps.changes.outputs.changed_files }}"

      - name: 📋 List Changed Files
        if: steps.changes.outputs.has_changed_files == 'true'
        run: |
          echo "Arquivos detectados:"
          printf '%s\n' "${{ steps.changes.outputs.changed_files }}"

      - name: 📋 List Files to Deploy
        if: steps.changes.outputs.has_changed_files == 'true'
        run: |
          echo "Arquivos preparados:"
          find deploy_temp -type f -maxdepth 20 || true

      - name: ✅ Check Deploy Files
        id: check_deploy
        if: steps.changes.outputs.has_changed_files == 'true'
        run: |
          if [ -d deploy_temp ] && find deploy_temp -maxdepth 20 -type f -print -quit | grep -q .; then
            echo "has_deploy_files=true" >> $GITHUB_OUTPUT
          else
            echo "has_deploy_files=false" >> $GITHUB_OUTPUT
          fi
          echo "Deploy files status: $(cat $GITHUB_OUTPUT | tail -n 1 || true)"

      - name: 🚀 Deploy Incremental (SFTP)
        if: steps.changes.outputs.has_changed_files == 'true' && steps.check_deploy.outputs.has_deploy_files == 'true'
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT != '' && secrets.SFTP_PORT || '22' }}
          local_path: './deploy_temp'
          remote_path: ${{ secrets.SFTP_REMOTE_DIR }}
          # Allow the action to run SSH commands (mkdir) when needed.
          # Otherwise SFTP upload fails if the remote directory does not already exist.
          sftp_only: false

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -rf deploy_temp
          echo "🧹 Arquivos temporários removidos"
