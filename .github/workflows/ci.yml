name: 🚀 Deploy Incremental

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Detect Changes
        id: changes
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git ls-tree -r --name-only HEAD | tr '\n' ' ' || true)
            DELETED_FILES=""
          else
            CHANGED_FILES=$(git diff --diff-filter=ACMRT --name-only "$BEFORE_SHA" HEAD | tr '\n' ' ' || true)
            DELETED_FILES=$(git diff --diff-filter=D --name-only "$BEFORE_SHA" HEAD | tr '\n' ' ' || true)
          fi
          if [ -n "$CHANGED_FILES" ] || [ -n "$DELETED_FILES" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            if [ -n "$CHANGED_FILES" ]; then
              echo "has_changed_files=true" >> $GITHUB_OUTPUT
            else
              echo "has_changed_files=false" >> $GITHUB_OUTPUT
            fi
            {
              echo "changed_files<<EOF"
              echo "$CHANGED_FILES"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            {
              echo "deleted_files<<EOF"
              echo "$DELETED_FILES"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "has_changed_files=false" >> $GITHUB_OUTPUT
          fi

      - name: ⏭️ Skip Deploy (No Changes)
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "✅ Nenhuma mudança detectada. Deploy cancelado."
          exit 0

      - name: 🗑️ Remove Deleted Files (Server)
        if: steps.changes.outputs.has_changes == 'true' && steps.changes.outputs.deleted_files != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          script: |
            cd ${{ secrets.SFTP_REMOTE_DIR }}
            FILES="${{ steps.changes.outputs.deleted_files }}"
            for f in $FILES; do
              if [ -f "$f" ]; then
                rm -f -- "$f" || true
                echo "removido arquivo: $f"
              fi
            done
            for f in $FILES; do
              d=$(dirname "$f")
              [ "$d" != "." ] && rmdir -p --ignore-fail-on-non-empty -- "$d" 2>/dev/null || true
            done

      - name: 🔧 Prepare Deploy
        if: steps.changes.outputs.has_changed_files == 'true'
        run: |
          mkdir -p deploy_temp
          echo "${{ steps.changes.outputs.changed_files }}" | tr ' ' '\n' | while read file; do
            if [ -f "$file" ]; then
              mkdir -p "deploy_temp/$(dirname "$file")"
              cp "$file" "deploy_temp/$file"
              echo "📄 Preparado: $file"
            fi
          done

      - name: ✅ Check Deploy Files
        id: check_deploy
        if: steps.changes.outputs.has_changed_files == 'true'
        run: |
          if [ -d deploy_temp ] && find deploy_temp -maxdepth 20 -type f -print -quit | grep -q .; then
            echo "has_deploy_files=true" >> $GITHUB_OUTPUT
          else
            echo "has_deploy_files=false" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 Deploy Incremental (SFTP)
        if: steps.check_deploy.outputs.has_deploy_files == 'true'
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT || 22 }}
          local_path: './deploy_temp/*'
          remote_path: ${{ secrets.SFTP_REMOTE_DIR }}
          sftp_only: true

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -rf deploy_temp
          echo "🧹 Arquivos temporários removidos"
