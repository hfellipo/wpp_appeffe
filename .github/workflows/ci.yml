name: 🚀 Deploy Incremental

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Detect Changes
        id: changes
        run: |
          CHANGED_FILES=$(git diff --diff-filter=ACMRT --name-only HEAD~1 HEAD | tr '\n' ' ' || true)
          DELETED_FILES=$(git diff --diff-filter=D --name-only HEAD~1 HEAD | tr '\n' ' ' || true)
          if [ -n "$CHANGED_FILES" ] || [ -n "$DELETED_FILES" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            {
              echo "changed_files<<EOF"
              echo "$CHANGED_FILES"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            {
              echo "deleted_files<<EOF"
              echo "$DELETED_FILES"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: ⏭️ Skip Deploy (No Changes)
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "✅ Nenhuma mudança detectada. Deploy cancelado."
          exit 0

      - name: 🗑️ Remove Deleted Files (Server)
        if: steps.changes.outputs.has_changes == 'true' && steps.changes.outputs.deleted_files != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          script: |
            cd ${{ secrets.SFTP_REMOTE_DIR }}
            FILES="${{ steps.changes.outputs.deleted_files }}"
            for f in $FILES; do
              if [ -f "$f" ]; then
                rm -f -- "$f" || true
                echo "removido arquivo: $f"
              fi
            done
            for f in $FILES; do
              d=$(dirname "$f")
              [ "$d" != "." ] && rmdir -p --ignore-fail-on-non-empty -- "$d" 2>/dev/null || true
            done

      - name: 🚀 Deploy (SFTP)
        if: steps.changes.outputs.has_changes == 'true'
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT || 22 }}
          local_path: './'
          remote_path: ${{ secrets.SFTP_REMOTE_DIR }}
          sftp_only: true

      - name: 🔧 Install & Build on Server
        if: steps.changes.outputs.has_changes == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.SFTP_REMOTE_DIR }}
            if [ -f "composer.json" ]; then
              composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader
              php artisan migrate --force || true
              php artisan config:cache || true
              php artisan route:cache || true
              php artisan view:cache || true
            fi
            if [ -f "package.json" ]; then
              npm ci || npm install
              npm run build || true
            fi
