name: 🚀 Deploy Incremental 2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    # ubuntu-latest tem mais runners disponíveis; evita "job was not acquired"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Validate deploy secrets
        run: |
          set -e
          if [ -z "${{ secrets.SFTP_HOST }}" ]; then echo "❌ Missing secret: SFTP_HOST"; exit 1; fi
          if [ -z "${{ secrets.SFTP_USERNAME }}" ]; then echo "❌ Missing secret: SFTP_USERNAME"; exit 1; fi
          if [ -z "${{ secrets.SFTP_PASSWORD }}" ]; then echo "❌ Missing secret: SFTP_PASSWORD"; exit 1; fi
          if [ -z "${{ secrets.SFTP_REMOTE_DIR }}" ]; then echo "❌ Missing secret: SFTP_REMOTE_DIR"; exit 1; fi

          case "${{ secrets.SFTP_REMOTE_DIR }}" in
            "~"* )
              echo "❌ SFTP_REMOTE_DIR must be absolute (ex: /var/www/.../web)"
              exit 1
              ;;
          esac

      - name: 🧰 Install rsync + sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass

      - name: 🚀 Deploy incremental (rsync)
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          set -e
          PORT="${{ secrets.SFTP_PORT != '' && secrets.SFTP_PORT || '22' }}"
          HOST="${{ secrets.SFTP_HOST }}"
          USER="${{ secrets.SFTP_USERNAME }}"
          REMOTE_DIR="${{ secrets.SFTP_REMOTE_DIR }}"

          echo "🚀 Deploying to ${USER}@${HOST}:${REMOTE_DIR}"

          sshpass -e rsync -az --human-readable --stats \
            -e "ssh -p ${PORT} -o StrictHostKeyChecking=no" \
            --exclude ".git" \
            --exclude ".env" \
            --exclude "node_modules/***" \
            --exclude "vendor/***" \
            --exclude "storage/***" \
            --exclude "bootstrap/cache/***" \
            "./" "${USER}@${HOST}:${REMOTE_DIR}/"

      - name: 📦 npm build no servidor
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          set -e
          PORT="${{ secrets.SFTP_PORT != '' && secrets.SFTP_PORT || '22' }}"
          HOST="${{ secrets.SFTP_HOST }}"
          USER="${{ secrets.SFTP_USERNAME }}"
          REMOTE_DIR="${{ secrets.SFTP_REMOTE_DIR }}"

          echo "📦 Running npm ci && npm run build on server..."
          sshpass -e ssh -p "${PORT}" -o StrictHostKeyChecking=no "${USER}@${HOST}" \
            "cd ${REMOTE_DIR} && npm ci && npm run build"
